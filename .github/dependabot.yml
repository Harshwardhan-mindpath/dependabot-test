version: 2
updates:
  - package-ecosystem: "docker-compose"
    directory: "/infra/ec2-stage"
    schedule:
      interval: "daily"
    
    # 1. This handles the "Create PR for Minor/Patch" part
    allow:
      - update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

    # 2. This "Silences" the Major versions (stops the PRs)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    
version: 2
updates:
  - package-ecosystem: "docker-compose"
    # Point to the specific directory where your docker-compose file lives
    directory: "/infra/ec2-stage"
    schedule:
      # As we found earlier, "daily" is the minimum allowed native interval
      interval: "daily"
    
    # Optional: Group updates to reduce PR noise
    groups:
      docker-dependencies:
        patterns:
          - "*"
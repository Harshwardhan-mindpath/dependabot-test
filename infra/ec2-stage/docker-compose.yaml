services:
  app:
    image: ghcr.io/<fill:set-container-image-path>:release
    healthcheck: # https://www.paulsblog.dev/how-to-successfully-implement-a-healthcheck-in-docker-compose/
      test: curl --fail http://localhost:4000 || exit 1
      interval: 60s
      retries: 5
      start_period: 10s
      timeout: 10s
    ports:
      - "4000:4000"
    user: "0:0"
    environment:
      #######################################################
      # Application Configuration
      #######################################################
      PORT: 4000
      PHX_HOST: "<fill:set-domain-name>"
      VIRTUAL_HOST: "<fill:set-domain-name>"
      LETSENCRYPT_HOST: "<fill:set-domain-name>"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      # https://hexdocs.pm/logger/1.12.3/Logger.html
      LOG_LEVEL: "info"
      SAASPRESSO_BASE_URL: "https://<fill:set-domain-name>"
 
      #######################################################
      # Password Configuration
      #######################################################
      PASSWORD_MIN_LENGTH: "8"
      PASSWORD_MAX_LENGTH: "50"
      PASSWORD_MIN_ALPHA_CHARS: "1"
      PASSWORD_MIN_NUMERIC_CHARS: "1"
      PASSWORD_RESTRICTED_TO_CHARS: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_+@#%$*&!/{}="
      PASSWORD_DISALLOW_USER_NAME: "true"
      PASSWORD_FORBIDDEN_PASSWORDS: "password,123456,123456789,12345678,12345,qwerty,abc123,password1,1234,000000"
      PASSWORDLESS_ENABLED: "true"
 
      #######################################################
      # Database Configuration
      #######################################################
      DATABASE_URL: "ecto://postgres:postgres@db/legalmanager"
      DATABASE_HOST: "db"
      DATABASE_PORT: "5432"
      DATABASE_NAME: "<fill:set-database-name>"
      DATABASE_USER: "postgres"
      DATABASE_PASSWORD: "postgres"
      DB_POOL_SIZE: 25
 
      #######################################################
      # AWS S3 Storage Configuration
      #######################################################
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET: ${AWS_SECRET}
      AWS_REGION: "eu-central-1"
      S3_SCHEME: "https"
      S3_REPLICATION_ROLE_ARN: "${S3_REPLICATION_ROLE_ARN:-}"
      REPLICATION_TARGET_AWS_ACCESS_KEY_ID: "${REPLICATION_TARGET_AWS_ACCESS_KEY_ID:-}"
      REPLICATION_TARGET_AWS_SECRET_ACCESS_KEY: "${REPLICATION_TARGET_AWS_SECRET_ACCESS_KEY:-}"
      REPLICATION_TARGET_AWS_REGION: "${REPLICATION_TARGET_AWS_REGION:-eu-west-1}"
      #######################################################
      # Account Configuration
      #######################################################
      ACCOUNT_DOCKER_IMAGE: "ghcr.io/fino-data-services/opsential:release"
      APPLICATION_SERVERS_ENV: ${APPLICATION_SERVERS_ENV:-prod}
      APPLICATION_SERVERS_NAME_PREFIX: ${APPLICATION_SERVERS_NAME_PREFIX:-prod-app-}
 
      #######################################################
      # Updates Overview (allow version downgrade when true)
      #######################################################
      UPDATES_ALLOW_DOWNGRADE: "${UPDATES_ALLOW_DOWNGRADE:-false}"
 
      #######################################################
      # OpenAPI Configuration
      #######################################################
      OPENAPI_HTTP_SCHEME: "https"
      OPENAPI_HTTP_PORT: "443"
 
      TERMS_OF_SERVICE_LINK: "https://dz4vgw9gpip4v.cloudfront.net/saaspresso/lorem-ipsum.pdf"
      PRIVACY_POLICY_LINK: "https://dz4vgw9gpip4v.cloudfront.net/saaspresso/privacy.pdf"
      DEFAULT_COUNTRY: "Germany"
      CONTACT_VALIDATION_SALT: "Vix9xioz92erszjk"
      ENABLE_LEGAL_MANAGER_FEATURE: "true"
      #######################################################
      # OPENTELEMETRY ENDPOINT
      #######################################################
      OPENTELEMETRY_ENDPOINT: "http://signoz.finodata.com:4318"
 
      #######################################################
      # Redis Configuration
      #######################################################
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      OPENRESTY_REDIS_HOST: "openresty-redis"
      OPENRESTY_REDIS_PORT: 6379
      OPENRESTY_REDIS_URL: "redis://openresty-redis:6379"
      REDIS_SESSION_PREFIX: ""
      SESSION_CACHE_POOL_SIZE: 30
 
      
      #######################################################
      # Registration Policy
      #######################################################
      AUTO_APPROVE_DOMAINS: ""
 
      #######################################################
      # IN-MEMORY CACHE CONFIGURATION
      #######################################################
      MEM_CACHE_DEFAULT_TTL: 86400
 
      #######################################################
      # API LOGS RETENTION CONFIGURATION
      #######################################################
      API_LOGS_RETENTION_HOURS: "48"
 
      #######################################################
      # API Rate Limiting Configuration
      #######################################################
      API_RATE_LIMIT_COUNT: "120"
      API_RATE_LIMIT_WINDOW: "60"
 
      # Back to top button visibility
      BACK_TO_TOP_ENABLED: "false"
      USER_INVITE_VALIDITY_IN_DAYS: "30"
      ACCOUNT_LOCKOUT_MAX_FAILED_ATTEMPTS: "10"
      ACCOUNT_UNLOCK_LINK_VALIDITY_DAYS: "30"
 
      #######################################################
      # Worker Server Configuration
      #######################################################
      WORKER_SERVERS_WHITE_LIST_SG: "sg-046db174dcb42bcaf"
      WORKER_SERVERS_BROWSER_SG: "sg-04b54c3a5cb22bb20"
      WORKER_SERVERS_SUBNET_ID: "subnet-04b189dc32dcea0d3"
      WORKER_SERVERS_KEYPAIR: "saaspresso-worker-server"
 
      #######################################################
      # Private and Public IP Configuration
      #######################################################
      PRIVATE_IP: "10.19.1.51"
      PUBLIC_IP: "63.178.209.224"
 
    networks:
      - proxy
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
 
      openresty-redis:
        condition: service_healthy
        restart: true
 
  # https://mkyong.com/docker/docker-running-postgresql-as-a-container/
  db:
    image: postgres:16.13
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "postgres"]
      interval: 60s
      retries: 5
      start_period: 5s
      timeout: 10s
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_USER: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - proxy
 
  # https://docs.exalate.com/docs/scripts-how-to-bring-up-a-reverse-proxy-using-the-jwildernginx-proxy
  nginx-proxy:
    image: jwilder/nginx-proxy:1.7
    container_name: nginx-proxy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./persistent/nginx/vhost.d:/etc/nginx/vhost.d
      - ./persistent/nginx/certs:/etc/nginx/certs
      - ./persistent/nginx/html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - /var/log/nginx:/var/log/nginx
      - ./nginx-proxy/conf/status.conf:/etc/nginx/conf.d/status.conf
    networks:
      - proxy
 
  ssl-generator:
    image: jrcs/letsencrypt-nginx-proxy-companion
    volumes_from:
      - nginx-proxy
    volumes:
      - ./persistent/nginx/vhost.d:/etc/nginx/vhost.d
      - ./persistent/nginx/certs:/etc/nginx/certs
      - ./persistent/nginx/html:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    environment:
      LETSENCRYPT_HOST: "<fill:set-domain-name>"
      VIRTUAL_HOST: "<fill:set-domain-name>"
      LETSENCRYPT_TEST: true # can be removed once system is up and running, set to true by default as requesting certs is limited to 5 per day
 
  postgres-backup:
    image: ghcr.io/fino-data-services/docker-postgres-dump:latest
    container_name: postgres-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: "db"
      PGUSER: "postgres"
      PGPASSWORD: "postgres"
      PGDATABASE: "<fill:set-database-name>"
      ENABLE_S3_UPLOAD: true
      AWS_ACCESS_KEY_ID: ${PROD_DATABASE_BACKUP_S3_KEY}
      AWS_SECRET_ACCESS_KEY: ${PROD_DATABASE_BACKUP_S3_SECRET}
      S3_BUCKET: "<fill:set-database-backup-s3-bucket-name>"
      S3_PATH: "postgres-dump"
      CRON_SCHEDULE: "0 2 * * *" # Dump database once at 2AM
    networks:
      - proxy
  signoz-host-otel-collectors:
    image: signoz/signoz-otel-collector:latest
    container_name: signoz-host-otel-collectors
    depends_on:
      app:
        condition: service_healthy
    user: root
    volumes:
      - /var/log/nginx/access.log:/tmp/saaspresso-access.log:ro
      - /var/log/nginx/error.log:/tmp/saaspresso-error.log:ro
      - /var/log/docker-prod.log:/tmp/saaspresso-app.log:ro
      - ./otel-collector-config.yaml:/etc/otel/config.yaml
 
  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 60s
      retries: 5
      start_period: 5s
      timeout: 10s
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - proxy
 
  openresty-redis:
    image: redis:7-alpine
    container_name: openresty-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - openresty-redis-data:/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 60s
      start_period: 9s
      retries: 3
networks:
  proxy:
 
volumes:
  db:
    driver: local
  openresty-redis-data:
    driver: local